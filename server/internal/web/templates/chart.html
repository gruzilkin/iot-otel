<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chart {{.DeviceID}}</title>
<link rel="stylesheet" href="/css/site.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
<div class="dashboard">
  <div class="item" id="temperature">– C</div>
  <div class="item" id="humidity">– %</div>
  <div class="item" id="ppm">– ppm</div>
  <div class="item" id="voc">– voc</div>
  <div class="item" id="pressure">– hPa</div>
  <div class="item" id="vibration">– m/s²</div>
</div>
<div id="chart" class="chart"></div>
<script>
const SENSORS = ['temperature', 'humidity', 'ppm', 'voc', 'pressure', 'vibration'];
const chartData = {{.Data}};
for (const k of SENSORS) chartData[k] = chartData[k] || [];

// ECharts paints a <canvas>, so it can't inherit the CSS color-scheme; read the
// OS preference here and use its built-in dark theme to match (picked at load).
const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
const chart = echarts.init(document.getElementById('chart'), prefersDark ? 'dark' : null);
chart.setOption({
  // Reuse the KPI colors from site.css so each line and its legend marker match the big
  // number up top. Series are declared in SENSORS order, so this palette lines up 1:1.
  color: SENSORS.map(k => getComputedStyle(document.getElementById(k)).color),
  tooltip: { trigger: 'axis' },
  legend: { data: SENSORS },
  xAxis: { type: 'time' },
  // scale: don't force zero into the range (pressure sits ~1013, not near 0);
  // boundaryGap: pad the data extent by 10% each side. With dataZoom's default
  // filterMode, each axis rescales to the data actually visible in the window.
  yAxis: [
    { name: 'C', position: 'left' },
    { name: '%', position: 'left', offset: 60 },
    { name: 'ppm', position: 'right' },
    { name: 'voc', position: 'right', offset: 60 },
    { name: 'hPa', position: 'left', offset: 120 },
    { name: 'm/s²', position: 'right', offset: 120 },
  ].map(a => ({ type: 'value', scale: true, boundaryGap: ['10%', '10%'], ...a })),
  dataZoom: [{ type: 'inside' }, { type: 'slider' }],
  series: [
    { name: 'temperature', type: 'line', showSymbol: false, yAxisIndex: 0, data: chartData.temperature },
    { name: 'humidity', type: 'line', showSymbol: false, yAxisIndex: 1, data: chartData.humidity },
    { name: 'ppm', type: 'line', showSymbol: false, yAxisIndex: 2, data: chartData.ppm },
    { name: 'voc', type: 'line', showSymbol: false, yAxisIndex: 3, data: chartData.voc },
    { name: 'pressure', type: 'line', showSymbol: false, yAxisIndex: 4, data: chartData.pressure },
    { name: 'vibration', type: 'line', showSymbol: false, yAxisIndex: 5, data: chartData.vibration },
  ],
});

// Keep a zoomed-in middle view anchored in time. ECharts stores the zoom window
// as percentages, so appended data would otherwise slide the view. We only let it
// auto-follow when the window's right edge is parked at the freshest sample.
const TAIL_EPS_MS = 2000;
let followTail = true;
let zoomWindow = null; // { start, end } absolute ms, set only while parked in the middle

function latestTime() {
  let max = null;
  for (const k of SENSORS) {
    const arr = chartData[k];
    if (arr && arr.length) {
      const t = arr[arr.length - 1][0];
      if (max === null || t > max) max = t;
    }
  }
  return max;
}

let renderTask;
function renderChart() {
  clearTimeout(renderTask);
  renderTask = setTimeout(() => {
    const opt = { series: SENSORS.map(k => ({ data: chartData[k] })) };
    // Re-pin the absolute window so newly appended data can't scroll a middle view.
    if (!followTail && zoomWindow) {
      opt.dataZoom = [{ startValue: zoomWindow.start, endValue: zoomWindow.end }];
    }
    chart.setOption(opt);
  }, 1);
}

function mergeUpdates(update) {
  for (const k of SENSORS) {
    const m = new Map();
    (chartData[k] || []).forEach(e => m.set(e[0], e[1]));
    (update[k] || []).forEach(e => m.set(e[0], e[1]));
    chartData[k] = [...m.keys()].sort((a, b) => a - b).map(t => [t, m.get(t)]);
  }
  renderChart();
}

let fetchTask;
function scheduleFetch(start, end) {
  clearTimeout(fetchTask);
  fetchTask = setTimeout(() => fetchUpdates(start, end), 100);
}
function fetchUpdates(start, end) {
  let url = location.pathname + '/partial';
  const q = [];
  if (start != null) q.push('start=' + Math.floor(start));
  if (end != null) q.push('end=' + Math.ceil(end));
  if (q.length) url += '?' + q.join('&');
  fetch(url)
    .then(r => { if (r.status === 401) { location.reload(); return null; } return r.json(); })
    .then(d => { if (d) mergeUpdates(d); });
}

chart.on('datazoom', () => {
  const dz = chart.getOption().dataZoom[0];
  scheduleFetch(dz.startValue, dz.endValue);
  // Follow the tail iff the window's right edge is at (or near) the newest sample;
  // otherwise remember the absolute window so renderChart keeps it fixed.
  const maxT = latestTime();
  followTail = maxT === null || dz.endValue == null || dz.endValue >= maxT - TAIL_EPS_MS;
  zoomWindow = (!followTail && dz.startValue != null && dz.endValue != null)
    ? { start: dz.startValue, end: dz.endValue }
    : null;
});

const units = { temperature: ' C', humidity: ' %', ppm: ' ppm', voc: '', pressure: ' hPa', vibration: ' m/s²' };
function updateKpi(name, value) {
  const el = document.getElementById(name);
  if (!el) return;
  const text = (name === 'ppm' || name === 'voc') ? Math.round(value) : value.toFixed(2);
  el.textContent = text + units[name];
}

// SSE stream of live readings. EventSource auto-reconnects (and handles
// backgrounded tabs) on its own, so there is no manual reconnect/keepalive.
let firstConnect = true;
const es = new EventSource(location.pathname + '/realtime');
es.onmessage = e => {
  const m = JSON.parse(e.data);
  for (const k of SENSORS) {
    if (m[k] !== undefined) { chartData[k].push([m.receivedAt, m[k]]); updateKpi(k, m[k]); }
  }
  renderChart();
};
es.onopen = () => {
  if (firstConnect) { firstConnect = false; return; } // page already rendered {{.Data}}
  fetchUpdates(); // backfill the gap after an auto-reconnect
};
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
