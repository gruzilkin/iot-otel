# Runs on the Raspberry Pi: reads I2C sensors and streams to the ingest service.
# Set TARGET (host:port) and BEARER (a device token from the web UI).
services:
  device:
    # Build context is the repo root so the Dockerfile can compile the top-level
    # proto (proto/) into Python stubs at build time.
    build:
      context: .
      dockerfile: device/Dockerfile
    environment:
      TARGET: ${TARGET}
      BEARER: ${BEARER}
      TLS: ${TLS:-}
      TEMPERATURE_OFFSET: ${TEMPERATURE_OFFSET:-}
      ALTITUDE: ${ALTITUDE:-}
      PYTHONUNBUFFERED: "1"
    devices:
      - /dev/i2c-1:/dev/i2c-1
    restart: always
